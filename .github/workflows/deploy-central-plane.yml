name: deploy-central-plane

# Stage 90A — MANUAL deploy only. This workflow NO LONGER auto-deploys on push
# to main. Merging apps/central-plane/** (or packages/core/**) to main runs CI
# (ci.yml) for validation but does NOT deploy. Production deploy is an explicit,
# human-triggered action:
#   Actions → deploy-central-plane → Run workflow (workflow_dispatch, on main).
#
# Why: this separates "code merged" from "code deployed" so a code-only merge can
# never accidentally ship to production. (Stage 89 hit exactly this: a docs/config
# merge auto-triggered a deploy that had to be cancelled mid-run.)
#
# On dispatch it builds → (optionally) applies pending D1 migrations → wrangler
# deploy → smoke. Migrations are forward-only + idempotent.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with "Edit Cloudflare Workers" + "D1 Edit"
#                            permissions. Create at:
#                            https://dash.cloudflare.com/profile/api-tokens
#                            (Bae action — one-time setup)
#   CLOUDFLARE_ACCOUNT_ID — visible at
#                            https://dash.cloudflare.com/<account-id>
#                            (also embedded in any worker URL)

on:
  # No `push` trigger by design — see header. Deploy is manual-only.
  workflow_dispatch:
    inputs:
      apply-migrations:
        description: 'Apply D1 migrations after deploy (default: true)'
        required: false
        default: 'true'
      confirm:
        description: 'Type "deploy" to confirm a production deploy'
        required: true
        default: ''

concurrency:
  group: deploy-central-plane
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Confirm deploy intent
        if: inputs.confirm != 'deploy'
        run: |
          echo "Refusing to deploy: the 'confirm' input must be exactly 'deploy'."
          echo "Re-run via Actions → deploy-central-plane → Run workflow and type 'deploy'."
          exit 1

      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build central-plane (+ core dep)
        run: pnpm turbo run build --filter @simsa/central-plane

      - name: Ensure R2 bucket (Stage 261 — idempotent)
        working-directory: apps/central-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create the evidence bucket if missing; "already exists" is fine —
          # the wrangler deploy step below fails loudly if it's truly absent.
          npx wrangler r2 bucket create simsa-evidence || echo "bucket exists or create skipped (deploy verifies)"

      - name: Apply D1 migrations
        if: inputs.apply-migrations != 'false'
        working-directory: apps/central-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 migrations apply --remote conclave-ai

      - name: Deploy Worker
        working-directory: apps/central-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy

      - name: Smoke test deployed endpoints
        run: |
          set -e
          curl -sS https://conclave-ai.seunghunbae.workers.dev/healthz | tee /dev/stderr | grep -q '"ok"'
          # Webhook should require a signed POST — expect 503 (no secret yet)
          # OR 401 (signature mismatch). Both prove the route is wired.
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST https://conclave-ai.seunghunbae.workers.dev/webhook/github -d '{}')
          if [ "$status" != "401" ] && [ "$status" != "503" ]; then
            echo "Unexpected /webhook/github status: $status"
            exit 1
          fi
          echo "Smoke test passed (status $status as expected)"
