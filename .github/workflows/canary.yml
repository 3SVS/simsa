name: canary

# Production canary — the eye that catches a "success-shaped failure" in
# minutes, not weeks. On 2026-07-05 the generation LLM was 100% degrading to a
# mock draft for ~3 weeks and only a human noticed. This probes the REAL
# user-facing paths every 15 min and fails the job (→ GitHub notifies the repo
# owner by email) when any is wrong. If CANARY_TELEGRAM_CHAT_ID is set it also
# DMs Telegram via the existing TELEGRAM_BOT_TOKEN.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      issues: write
    env:
      BASE: https://conclave-ai.seunghunbae.workers.dev
      APP: https://app.trysimsa.com
    steps:
      - name: Probe production
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          fails=""

          # 1. Worker health
          if ! curl -sS --max-time 20 "$BASE/healthz" | grep -q '"db":"up"'; then
            fails="$fails\n- healthz: db not up"
          fi

          # 2. Auth session proxy (first-party cookie path)
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "$APP/api/auth/get-session")
          if [ "$code" != "200" ]; then fails="$fails\n- auth get-session: HTTP $code"; fi

          # 3. Review preflight must allow Idempotency-Key (the 3-week CORS bug)
          if ! curl -sS -i --max-time 20 -X OPTIONS \
               "$BASE/workspace/projects/x/github/pulls/1/review" \
               -H "Origin: $APP" -H "Access-Control-Request-Method: POST" \
               -H "Access-Control-Request-Headers: content-type,idempotency-key" \
             | grep -i "access-control-allow-headers" | grep -qi "idempotency-key"; then
            fails="$fails\n- review preflight: Idempotency-Key not allowed"
          fi

          # 4. THE crown jewel: generation must be a REAL llm draft, not a mock.
          #    (This is exactly what silently broke.) One call/15min; the
          #    per-IP hourly rate limit won't trip at this cadence.
          gen=$(curl -sS --max-time 90 -X POST "$BASE/workspace/idea-to-spec-draft" \
                -H "content-type: application/json" \
                -d '{"idea":"canary — a small app to track daily water intake","locale":"en"}')
          src=$(printf '%s' "$gen" | sed -n 's/.*"source":"\([^"]*\)".*/\1/p')
          err=$(printf '%s' "$gen" | sed -n 's/.*"error":"\([^"]*\)".*/\1/p')
          if [ "$src" != "llm" ]; then
            fails="$fails\n- generation NOT real: source=${src:-none} error=${err:-none}"
          fi

          # 5. Deploy freshness — "merged but never deployed" has bitten us twice
          #    (deploy-central-plane is manual). Flag when main is ahead of the
          #    deployed Worker AND the oldest undeployed commit is >12h old.
          #    Fail-safe: any ambiguity (unknown sha / API hiccup) → no alert.
          deployed=$(curl -sS --max-time 20 "$BASE/healthz" | sed -n 's/.*"deployedSha":"\([^"]*\)".*/\1/p')
          if [ -n "$deployed" ] && [ "$deployed" != "unknown" ]; then
            head=$(curl -sS --max-time 20 -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/main" | jq -r '.sha // empty')
            if [ -n "$head" ] && [ "$head" != "$deployed" ]; then
              cmp=$(curl -sS --max-time 20 -H "Authorization: Bearer $GH_TOKEN" \
                   "https://api.github.com/repos/${GITHUB_REPOSITORY}/compare/${deployed}...${head}")
              ahead=$(printf '%s' "$cmp" | jq -r '.ahead_by // 0')
              oldest=$(printf '%s' "$cmp" | jq -r '.commits[0].commit.committer.date // empty')
              if [ "${ahead:-0}" -gt 0 ] && [ -n "$oldest" ]; then
                age=$(( $(date -u +%s) - $(date -u -d "$oldest" +%s) ))
                if [ "$age" -gt 43200 ]; then
                  hrs=$(( age / 3600 ))
                  fails="$fails\n- deploy stale: main is ${ahead} commit(s) ahead of the deployed Worker (oldest undeployed ~${hrs}h old). Run deploy-central-plane."
                fi
              fi
            fi
          fi

          if [ -n "$fails" ]; then
            echo -e "SIMSA CANARY FAILED:$fails"
            {
              echo "status=fail"
              echo "summary<<EOF"
              echo -e "🔴 Simsa canary failed:$fails"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All canary checks passed."

      # Loud, secret-free alert channel. Email alone failed us: the canary
      # ran red for 5 straight days (2026-07-10 → 07-15) and nobody noticed,
      # because GitHub's failure email is easy to skim past. An OPEN issue is
      # a standing red flag on the repo until someone acts; it auto-closes on
      # the first green run so it can never go stale in the other direction.
      - name: Open tracking issue (on failure, secret-free)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          MSG: ${{ steps.probe.outputs.summary }}
        run: |
          gh label create canary --repo "$GITHUB_REPOSITORY" \
            --description "Production canary alerts" --color B60205 2>/dev/null || true
          open_issue=$(gh issue list --repo "$GITHUB_REPOSITORY" --label canary \
            --state open --json number --jq '.[0].number // empty')
          body=$(printf '%s\n\nRun: %s/%s/actions/runs/%s\n(auto-filed by canary; closes itself on the first green run)' \
            "${MSG:-🔴 Simsa canary failed.}" \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
          if [ -z "$open_issue" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --label canary \
              --title "🔴 Production canary failing" --body "$body"
          else
            echo "Canary issue #$open_issue already open — not spamming."
          fi

      - name: Close tracking issue (on recovery)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for n in $(gh issue list --repo "$GITHUB_REPOSITORY" --label canary \
                     --state open --json number --jq '.[].number'); do
            gh issue close "$n" --repo "$GITHUB_REPOSITORY" \
              --comment "✅ Canary green again: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          done

      - name: Telegram alert (optional)
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.CANARY_TELEGRAM_CHAT_ID }}
          MSG: ${{ steps.probe.outputs.summary }}
        run: |
          # No token/chat configured → GitHub's native failure email is the
          # alert; skip Telegram silently.
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "Telegram not configured — relying on GitHub failure notification."
            exit 0
          fi
          TEXT="${MSG:-🔴 Simsa canary failed (see the Actions run).}"
          curl -sS --max-time 20 \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${TEXT}" >/dev/null || true
