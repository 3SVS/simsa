name: set-worker-secrets

# Pushes Worker secrets from GitHub repo secrets to the production Worker via
# `wrangler secret put`. NEVER run `wrangler secret put` from a laptop — with
# Containers bindings it strands a staged version and locks deploys
# (2026-05 incident). This workflow is the only supported path.
#
# Usage:
#   1. Add the value as a GitHub repo secret (Settings → Secrets and variables
#      → Actions → New repository secret), using the exact Worker secret name
#      (e.g. RESEND_API_KEY).
#   2. Actions → set-worker-secrets → Run workflow (on main): type "set" in
#      `confirm` and list the names to push in `names` (comma-separated),
#      e.g. "RESEND_API_KEY,NOTIFY_EMAIL_FROM".
#
# Only names in the allowlist below are pushed; anything else is refused.
# A name whose repo secret is missing/empty is skipped with a warning (the
# run still succeeds so one typo doesn't block the rest).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "set" to confirm pushing secrets to production'
        required: true
        default: ''
      names:
        description: 'Comma-separated Worker secret names (must exist as repo secrets)'
        required: true

concurrency:
  group: set-worker-secrets
  cancel-in-progress: false

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Confirm intent
        if: inputs.confirm != 'set'
        run: |
          echo "Refusing: the 'confirm' input must be exactly 'set'."
          exit 1

      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Push secrets to Worker
        working-directory: apps/central-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Allowlisted candidates — the loop below only reads names the
          # dispatcher listed, and only if they are in ALLOWED.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_CLIENT_ID: ${{ secrets.GH_APP_CLIENT_ID }}
          GH_APP_CLIENT_SECRET: ${{ secrets.GH_APP_CLIENT_SECRET }}
          GH_APP_WEBHOOK_SECRET: ${{ secrets.GH_APP_WEBHOOK_SECRET }}
          CONCLAVE_TOKEN_KEK: ${{ secrets.CONCLAVE_TOKEN_KEK }}
          WORKSPACE_GH_CLIENT_SECRET: ${{ secrets.WORKSPACE_GH_CLIENT_SECRET }}
          ADMIN_USAGE_STATS_KEY: ${{ secrets.ADMIN_USAGE_STATS_KEY }}
          INTERNAL_CALLBACK_TOKEN: ${{ secrets.INTERNAL_CALLBACK_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
          LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}
          LS_SUBSCRIPTION_VARIANT_CREDITS: ${{ secrets.LS_SUBSCRIPTION_VARIANT_CREDITS }}
          DEMO_RATE_SALT: ${{ secrets.DEMO_RATE_SALT }}
        run: |
          set -euo pipefail
          ALLOWED="RESEND_API_KEY NOTIFY_EMAIL_FROM GH_APP_ID GH_APP_PRIVATE_KEY GH_APP_CLIENT_ID GH_APP_CLIENT_SECRET GH_APP_WEBHOOK_SECRET CONCLAVE_TOKEN_KEK WORKSPACE_GH_CLIENT_SECRET ADMIN_USAGE_STATS_KEY INTERNAL_CALLBACK_TOKEN TELEGRAM_BOT_TOKEN TELEGRAM_WEBHOOK_SECRET ANTHROPIC_API_KEY OPENAI_API_KEY GEMINI_API_KEY LEMONSQUEEZY_API_KEY LEMONSQUEEZY_STORE_ID LEMONSQUEEZY_WEBHOOK_SECRET LS_SUBSCRIPTION_VARIANT_CREDITS DEMO_RATE_SALT"
          pushed=0
          for name in $(echo "${{ inputs.names }}" | tr ',' ' '); do
            if ! echo "$name" | grep -Eq '^[A-Z][A-Z0-9_]*$'; then
              echo "::error::'$name' is not a valid secret name"; exit 1
            fi
            allowed=false
            for a in $ALLOWED; do [ "$a" = "$name" ] && allowed=true; done
            if [ "$allowed" != "true" ]; then
              echo "::error::'$name' is not in the allowlist — add it to set-worker-secrets.yml first"; exit 1
            fi
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::repo secret '$name' is missing or empty — skipped"
              continue
            fi
            printf '%s' "$value" | npx wrangler secret put "$name"
            echo "pushed $name"
            pushed=$((pushed+1))
          done
          echo "Done: $pushed secret(s) pushed."
