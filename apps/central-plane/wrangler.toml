name = "conclave-ai"
account_id = "8735d5a7b0af1d7f97dd46f705ace797"
main = "src/index.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

# D1 binding. `database_id` must be replaced with the id returned by
# `wrangler d1 create conclave-ai` on first setup.
[[d1_databases]]
binding = "DB"
database_name = "conclave-ai"
database_id = "28be7ec4-9c46-4b78-8d07-11f344021dd0"

[vars]
ENVIRONMENT = "production"
# Public GitHub OAuth App client_id. Register at https://github.com/settings/developers
# (type: OAuth App, enable device flow). Leave the placeholder if OAuth is not
# yet configured — /oauth/device/* endpoints will return 503 until this is real.
GITHUB_CLIENT_ID = "Ov23ctqhuNRdhunT36Y9"

# Stage 9 — Workspace GitHub OAuth (Web Application Flow).
# Register a NEW OAuth App at https://github.com/settings/developers
# Callback URL: https://conclave-ai.seunghunbae.workers.dev/workspace/github/oauth/callback
# Leave as REPLACE_WITH_* until registered — endpoints return 503 gracefully.
# Client SECRET must be set via: wrangler secret put WORKSPACE_GH_CLIENT_SECRET
WORKSPACE_GH_CLIENT_ID = "REPLACE_WITH_WORKSPACE_GITHUB_OAUTH_CLIENT_ID"
WORKSPACE_GH_REDIRECT_URI = "https://conclave-ai.seunghunbae.workers.dev/workspace/github/oauth/callback"
WORKSPACE_GH_SCOPES = "read:user public_repo"
WORKSPACE_GH_DASHBOARD_URL = "https://dashboard.conclave-ai.dev"

# Observability. Logs retained 3 days on free tier, sufficient for v0.4-alpha.
[observability]
enabled = true

# v0.13.7 — webhook self-heal cron. Telegram drops the registered
# webhook the moment any consumer calls `getUpdates` on the same bot
# token (long-polling and webhooks are mutually exclusive). In a
# multi-repo dogfood environment, stale CI workflows or dev tools
# occasionally do that. The cron runs every 10 minutes, checks
# `getWebhookInfo`, and rebinds `setWebhook` if our URL is missing.
# Worst-case window of inert action buttons = 10 min.
[triggers]
# */10  — Telegram webhook self-heal (rebinds when getUpdates drops it)
# */5   — SaaS jobs stuck-cleanup (fail jobs stuck in `accepted` >30 min)
# 03:00 UTC daily — external design-reference refresh (Phase 4)
# every 6h     — feedback classification retry (Sprint A: pending → classified)
# 04:00 UTC daily — seed-promoter (Sprint C: classified feedback → promoted_seeds)
# 05:00 UTC Sundays — source-discovery (Sprint E1: scan GitHub for new design-pattern repos)
# 06:00 UTC daily   — oss-pr-miner (Sprint E2: extract patterns from popular OSS bugfix PRs)
# 07:00 UTC Mondays — changelog-monitor (Sprint E3: track new releases — now 250 sources via watched-sources.ts)
# 08:00 UTC Mondays — agent-spawner (Sprint E5 shadow: detect new domains in classified-as-other feedback, propose new agent persona)
# 10:00 UTC daily   — cve-advisory-miner (Sprint E7: GitHub Security Advisory across npm/pip/rubygems/maven)
# 08:00 UTC Wednesdays — mcp-registry-miner (Sprint E7: npm @modelcontextprotocol/* + servers/README catalog)
# 08:00 UTC Thursdays  — shadcn-block-miner (Sprint E7: awesome-shadcn-ui + ui.shadcn.com registry)
# 08:00 UTC Fridays    — awesome-list-miner (Sprint E7: 14 awesome-* catalogs)
#
# v0.14.4 — day-of-week=0 (Sunday) is rejected by Cloudflare's cron parser
# (`code: 10100, invalid cron string`). CF Workers cron uses 1-7 with
# Sunday=7 (NOT the POSIX 0-6 range). The dispatcher in src/index.ts
# branches on the literal cron expression, so `0 5 * * 7` here MUST
# match the same string in the scheduled() handler.
crons = ["*/10 * * * *", "*/5 * * * *", "0 3 * * *", "0 */6 * * *", "0 4 * * *", "0 5 * * 7", "0 6 * * *", "0 7 * * 1", "0 8 * * 1", "0 10 * * *", "0 8 * * 3", "0 8 * * 4", "0 8 * * 5"]

# v0.16.2 — Conclave AI sandbox container.
#
# Runs the autofix-pipeline in an isolated Node 20 container per /saas/review
# or /saas/autofix request. The Worker spawns one instance per PR (named
# slug pr-<repo>-<prNumber>) so concurrent requests don't collide.
#
# Image is built from apps/central-plane/container/Dockerfile in CI by the
# deploy-central-plane.yml workflow (Bae's CF API token must be set in
# repo secrets for the workflow to push the image).
#
# CF Containers Paid plan required ($5/mo) — already provisioned.
[[containers]]
class_name = "ConclaveSandbox"
image = "./container/Dockerfile"
image_build_context = "../.."
max_instances = 10

[[durable_objects.bindings]]
class_name = "ConclaveSandbox"
name = "SANDBOX"

[[migrations]]
tag = "v1-sandbox"
new_sqlite_classes = ["ConclaveSandbox"]
